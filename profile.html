<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile | GoTrip</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        .profile-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .info-group {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }
        .info-group label {
            display: block;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        .info-group p {
            margin: 0;
            font-size: 1.1em;
            color: #333;
            font-weight: 500;
        }
        .logout-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .logout-btn:hover {
            background: #c0392b;
        }
    </style>
</head>

<body>
    <!-- Simple Nav -->
    <nav class="navbar" style="background:#2c3e50;">
        <div class="nav-brand">
            <a href="index.html" style="color:white; text-decoration:none;">
                <i class="fas fa-plane-departure"></i> Go Trip
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html" style="color:white;">Home</a></li>
            <li><a href="packages.html" style="color:white;">Packages</a></li>
        </ul>
    </nav>

    <div class="profile-container">
        <div class="profile-header">
            <h1><i class="fas fa-user-circle"></i> My Profile</h1>
            <p id="welcomeMsg">Loading...</p>
        </div>

        <div class="profile-info" id="profileInfo" style="display:none;">
            <div class="info-group">
                <label>Full Name</label>
                <p id="profileName">-</p>
            </div>
            <div class="info-group">
                <label>Username</label>
                <p id="profileUser">-</p>
            </div>
            <div class="info-group">
                <label>Email Address</label>
                <p id="profileEmail">-</p>
            </div>
            <div class="info-group">
                <label>Account Type</label>
                <p id="profileRole">-</p>
            </div>
        </div>

        <div class="bookings-section" style="margin-top: 40px;">
            <h2><i class="fas fa-suitcase"></i> My Bookings</h2>
            <div style="overflow-x:auto;">
                <table class="admin-table" style="width:100%; border-collapse:collapse; margin-top:15px; text-align:left;">
                    <thead>
                        <tr style="background:#f8f9fa; border-bottom:1px solid #ddd;">
                            <th style="padding:10px;">ID</th>
                            <th style="padding:10px;">Destination</th>
                            <th style="padding:10px;">Date</th>
                            <th style="padding:10px;">Travelers</th>
                            <th style="padding:10px;">Status</th>
                            <th style="padding:10px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTableBody">
                        <tr><td colspan="6" style="text-align:center; padding:10px;">Loading bookings...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="#" class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <script src="js/profile.js"></script>
</body>

</html>
